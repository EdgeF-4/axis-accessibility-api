# Alembic configuration for AXIS.
#
# The real database URL is read from the AXIS settings (axis.config) at
# runtime by ``src/axis/db/migrations/env.py``; the placeholder below is
# only used if env.py cannot import the application (e.g. running alembic
# from a wheel without axis installed).
[alembic]
script_location = src/axis/db/migrations
prepend_sys_path = src
version_path_separator = os
# sqlalchemy.url is filled in by env.py from axis.config.get_settings(); leave
# blank here so the application's settings layer is the single source of truth.
sqlalchemy.url =

# Use a date-stamped filename so the version directory reads as a timeline.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
