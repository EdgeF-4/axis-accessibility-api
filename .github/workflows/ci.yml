name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  lint-and-typecheck:
    name: lint + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src tests

      - name: ruff format --check
        run: ruff format --check src tests

      - name: mypy --strict
        run: mypy --strict src tests

  tests:
    name: pytest (postgres + redis services)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: axis
          POSTGRES_PASSWORD: axis
          POSTGRES_DB: axis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U axis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      AXIS_DB_DSN: postgresql+asyncpg://axis:axis@localhost:5432/axis
      AXIS_REDIS_URL: redis://localhost:6379/0
      AXIS_JWT_SECRET: ci-only-replace-with-a-real-secret-of-at-least-32-bytes
      AXIS_TEST_DISABLE_DOCKER: "1"  # use the service container, not testcontainers
      AXIS_FAKE_EMBEDDER: "1"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: apply migrations
        run: |
          AXIS_DB_DSN=$AXIS_DB_DSN python -c "
          import asyncio
          from alembic.config import Config
          from alembic import command
          cfg = Config('alembic.ini')
          cfg.set_main_option('sqlalchemy.url', '$AXIS_DB_DSN')
          command.upgrade(cfg, 'head')
          "

      - name: pytest with coverage
        run: pytest tests/ --cov=axis --cov-report=xml --cov-report=term --cov-fail-under=85

      - name: upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: build runtime image
        run: docker build --target runtime --tag axis:ci .

      - name: smoke — image starts and exposes /healthz
        run: |
          docker run --rm -d --name axis-smoke -p 8000:8000 \
            -e AXIS_DB_DSN=postgresql+asyncpg://axis:axis@127.0.0.1:5432/axis \
            -e AXIS_REDIS_URL=redis://127.0.0.1:6379/0 \
            -e AXIS_JWT_SECRET=ci-only-replace-with-a-real-secret-of-at-least-32-bytes \
            axis:ci
          # Healthz does not need DB; just wait for the process to bind.
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8000/api/v1/healthz; then echo; break; fi
            sleep 1
          done
          docker logs axis-smoke | tail -50
          docker stop axis-smoke
